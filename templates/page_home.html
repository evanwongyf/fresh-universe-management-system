{% extends "base.html" %}
{% block title %}Home Page — Fresh Universe CMS{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Home page</h1>
</div>

<form method="POST">
  <div class="form-card" style="margin-bottom:24px;">
    <p class="section-title" style="margin-bottom:20px;">Welcome section</p>
    <div class="form-group">
      <label for="welcome_heading">Heading</label>
      <input type="text" id="welcome_heading" name="welcome_heading"
             value="{{ config.welcome_heading or '' }}" placeholder="Welcome">
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label for="welcome_text">Body text</label>
      <textarea id="welcome_text" name="welcome_text" rows="5"
                placeholder="Mission statement…">{{ config.welcome_text or '' }}</textarea>
    </div>
  </div>

  <div class="form-card" style="margin-bottom:24px;">
    <p class="section-title" style="margin-bottom:20px;">Moving banner</p>
    <div class="form-group" style="margin-bottom:0;">
      <label for="banner_items">Banner items</label>
      <input type="text" id="banner_items" name="banner_items"
             value="{{ config.banner_items or '' }}"
             placeholder="Literature,Art,Photography,Music,Experimental,Everything">
      <p class="form-hint">Comma-separated list of items shown in the scrolling banner</p>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save changes</button>
  </div>
</form>
{% endblock %}
