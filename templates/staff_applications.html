{% extends "base.html" %}
{% block title %}Staff Applications — Fresh Universe CMS{% endblock %}

{% block head %}
<style>
  .role-block {
    background: var(--off-white);
    border: 1px solid var(--gray-4);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 10px;
    position: relative;
  }
  .role-block .role-num {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--gray-3); margin-bottom: 10px;
  }
  .role-remove {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; cursor: pointer;
    color: var(--gray-3); font-size: 18px; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .role-remove:hover { color: var(--red); background: #fde8e8; }
  .status-toggle {
    display: flex; align-items: center; gap: 12px;
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 100px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: 2px solid transparent;
    transition: all 0.15s;
  }
  .status-pill.open  { background:#e6f4ec; color:var(--green); border-color:var(--green); }
  .status-pill.closed { background:#fde8e8; color:var(--red);   border-color:var(--red); }
  .hiring-toggle {
    display: flex; align-items: center; gap: 8px; margin-top: 10px;
  }
  .hiring-toggle label {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    font-size: 12px; font-weight: 500; text-transform: none; letter-spacing: 0;
    color: var(--gray-2);
  }
  .hiring-switch {
    position: relative; display: inline-block; width: 36px; height: 20px;
  }
  .hiring-switch input { opacity: 0; width: 0; height: 0; }
  .hiring-slider {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--gray-4); border-radius: 20px;
    transition: background 0.2s;
  }
  .hiring-slider:before {
    content: ""; position: absolute;
    height: 14px; width: 14px; left: 3px; bottom: 3px;
    background: white; border-radius: 50%; transition: transform 0.2s;
  }
  .hiring-switch input:checked + .hiring-slider { background: var(--green); }
  .hiring-switch input:checked + .hiring-slider:before { transform: translateX(16px); }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Staff Applications</h1>
</div>

<form method="POST">

  <!-- Status + header -->
  <div class="form-card" style="margin-bottom:24px;">
    <p class="section-title" style="margin-bottom:20px;">Page settings</p>

    <div class="form-group">
      <label>Applications status</label>
      <div class="status-toggle">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:14px;font-weight:400;">
          <input type="radio" name="is_open" value="1" {% if config.is_open %}checked{% endif %}>
          <span class="status-pill open">● Open</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:14px;font-weight:400;">
          <input type="radio" name="is_open" value="0" {% if not config.is_open %}checked{% endif %}>
          <span class="status-pill closed">● Closed</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="heading">Heading</label>
      <input type="text" id="heading" name="heading" value="{{ config.heading or '' }}"
             placeholder="Staff Applications are currently open.">
    </div>

    <div class="form-group" style="margin-bottom:0;">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4"
                placeholder="We're looking for passionate individuals…">{{ config.description or '' }}</textarea>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save changes</button>
  </div>
</form>
{% endblock %}
