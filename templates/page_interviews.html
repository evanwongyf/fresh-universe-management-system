{% extends "base.html" %}
{% block title %}Interviews Page Header — Fresh Universe CMS{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Interviews page header</h1>
</div>

<form method="POST">
  <div class="form-card">
    <p class="section-title" style="margin-bottom:20px;">Content</p>
    <div class="form-group">
      <label for="heading">Heading</label>
      <input type="text" id="heading" name="heading"
             value="{{ config.heading or '' }}"
             placeholder="Fresh interviews with international talents">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="3"
                placeholder="We're excited to share conversations…">{{ config.description or '' }}</textarea>
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label for="form_url">Book an interview link (optional)</label>
      <input type="text" id="form_url" name="form_url"
             value="{{ config.form_url or '' }}" placeholder="https://forms.gle/…">
      <p class="form-hint">Leave blank to hide the button</p>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save changes</button>
  </div>
</form>
{% endblock %}
