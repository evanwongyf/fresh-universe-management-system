{% extends "base.html" %}
{% block title %}Log in — Fresh Universe CMS{% endblock title %}

{% block content_auth %}
<div class="auth-card">
  <div class="auth-logo">
    <span>Fresh Universe</span>
    <h2>Welcome back</h2>
    <p>Log in to manage your content</p>
  </div>

  <form method="POST">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" autofocus
             value="{{ request.form.email or '' }}">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px;">
      Log in
    </button>
  </form>
</div>
{% endblock content_auth %}
