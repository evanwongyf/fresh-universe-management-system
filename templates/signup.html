{% extends "base.html" %}
{% block title %}Sign up — Fresh Universe CMS{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-logo">
    <span>Fresh Universe</span>
    <h2>Create an account</h2>
    <p>Get access to the CMS</p>
  </div>

  <form method="POST">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus
             value="{{ request.form.username or '' }}">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="new-password">
      <p class="form-hint">At least 6 characters</p>
    </div>
    <div class="form-group">
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" name="confirm" autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px;">
      Create account
    </button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="{{ url_for('login') }}">Log in</a>
  </div>
</div>
{% endblock %}
