{% extends "base.html" %}
{% block title %}{{ 'Edit' if mode == 'edit' else 'New' }} Group — Fresh Universe CMS{% endblock %}

{% block content %}
<div class="page-header">
  <h1>{{ 'Edit group' if mode == 'edit' else 'New group' }}</h1>
  <a href="{{ url_for('admin_groups') }}" class="btn btn-secondary">← Back</a>
</div>

<form method="POST" class="form-card">
  <div class="form-group">
    <label for="name">Group name</label>
    <input type="text" id="name" name="name" value="{{ group.name or '' }}" placeholder="e.g. Literary Team" required>
  </div>

  <div class="form-group">
    <label>Permissions</label>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-top:8px;">
      {% for perm in all_permissions %}
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;text-transform:none;letter-spacing:0;font-weight:400;cursor:pointer;padding:8px 12px;border:1px solid var(--gray-4);border-radius:6px;">
        <input type="checkbox" name="permissions" value="{{ perm }}"
               {% if perm in (group.permissions or []) %}checked{% endif %}>
        {{ perm.replace('can_','').replace('_',' ').title() }}
      </label>
      {% endfor %}
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">{{ 'Save changes' if mode == 'edit' else 'Create group' }}</button>
    <a href="{{ url_for('admin_groups') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
